# BackseatSimulator 設定ファイル

# --- キャプチャ ---
capture_interval: 8           # キャプチャ間隔（秒）
capture_mode: active_window   # active_window | full_desktop
image_max_size: 1280          # リサイズ長辺 (px)
change_threshold: 0.05        # 差分検知の閾値
max_skip_count: 4             # 差分なしでもN回に1回は強制キャプチャ

# --- AI (Transformers) ---
model_id: "google/gemma-4-E2B-it"   # HuggingFace モデルID
quantization: "4bit"                 # auto | 4bit | 8bit | none
device_map: "cuda:0"                 # auto | cpu | cuda:0
max_new_tokens: 150                  # 生成トークン上限
persona: "shijicyu"                  # プロンプトプリセット名
visual_token_budget: 140             # ビジュアルトークン予算 (70/140/280)
ple_offload: true                    # PLEテーブルをCPUにオフロード (VRAM ~4.5GB削減)

# --- フォーカス ---
enable_focus: true             # 動的フォーカス機能の有効/無効
focus_grid: [3, 3]             # グリッド分割 [rows, cols]
focus_diff_threshold: 0.05     # フォーカス対象とするdiff閾値
focus_crop_size: 640           # クロップ画像の長辺 (px)

# --- オーバーレイ ---
font_size: 36
scroll_speed: 3.0             # px/frame
max_comments: 20
